  <style>
    @font-face {
      font-family: 'Nohemi';
      src: url('fonts/Nohemi-VF.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #F8F6F1;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      padding: 80px;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Subtle corner mark */
    .card::before {
      content: 'mhrezina.com';
      position: absolute;
      bottom: 48px;
      right: 60px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #B0AEA8;
      letter-spacing: 0.02em;
    }

    /* handwritten "hi, i'm Mariia ♡" */
    .og-intro {
      height: 42px;
      width: auto;
      display: block;
      margin-bottom: 36px;
    }

    /* Product Designer */
    .og-title {
      font-family: 'Nohemi', 'DM Sans', sans-serif;
      font-size: 82px;
      font-weight: 500;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: #1A5C3A;
      margin-bottom: 32px;
    }

    /* SaaS ✦ Growth ✦ AI badge */
    .og-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1.5px solid rgba(26, 92, 58, 0.22);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #1A5C3A;
      letter-spacing: 0.01em;
      margin-bottom: 36px;
    }

    /* designing complex workflows… */
    .og-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 300;
      line-height: 1.55;
      color: #7A7870;
      letter-spacing: 0.005em;
    }
  </style>
</head>
